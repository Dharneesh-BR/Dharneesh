[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NPM_FLAGS = "--legacy-peer-deps"

# Handle payment success with query parameters
[[redirects]]
  from = "/magna-business-masterclass/*"
  to = "/index.html"
  status = 200

# Handle all other routes (SPA routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
